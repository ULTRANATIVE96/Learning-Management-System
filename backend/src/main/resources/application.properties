# Server Port Configuration
server.port=${PORT:8080}

# Database Connection (H2 by default, PostgreSQL if environment variables are provided)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/mytutordb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (available at /h2-console when running H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# File Upload Settings
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
